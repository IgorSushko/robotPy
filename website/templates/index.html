<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robot Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="wifi-signal-container">
        <span>Wi-Fi Signal:</span>
        <div id="wifi-level"></div>
        <span id="wifi-percentage"></span>
    </div>

    <div class="controls">
        <button id="up-btn" class="d-pad-btn" type="button">▲ UP</button>
        <button id="down-btn" class="d-pad-btn" type="button">▼ DOWN</button>
        <button id="left-btn" class="d-pad-btn" type="button">◀ LEFT</button>
        <button id="right-btn" class="d-pad-btn" type="button">▶ RIGHT</button>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
